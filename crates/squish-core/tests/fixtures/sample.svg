<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!-- A sample SVG with lots of whitespace, comments, and redundant metadata
     for the compressor to strip. -->
<svg xmlns="http://www.w3.org/2000/svg"
     xmlns:xlink="http://www.w3.org/1999/xlink"
     xmlns:sodipodi="http://sodipodi.sourceforge.net/DTD/sodipodi-0.0.dtd"
     width="200"
     height="200"
     viewBox="0 0 200 200"
     version="1.1"
     id="svg1">

  <!-- Metadata that should be stripped by minifier -->
  <sodipodi:namedview
     id="namedview1"
     pagecolor="#ffffff"
     bordercolor="#666666"
     borderopacity="1"
     showgrid="false" />

  <defs id="defs1">
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   style="stop-color:rgb(255,0,0);stop-opacity:1" />
      <stop offset="100%" style="stop-color:rgb(0,0,255);stop-opacity:1" />
    </linearGradient>
    <!-- Unused gradient — minifier should drop this -->
    <linearGradient id="unused_grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:rgb(0,255,0)" />
      <stop offset="100%" style="stop-color:rgb(0,0,0)" />
    </linearGradient>
  </defs>

  <!-- The actual visible content -->
  <rect x="10.12345"
        y="10.6789012"
        width="180.0000001"
        height="180.0"
        fill="url(#grad1)"
        stroke="black"
        stroke-width="2" />

  <circle cx="100.00000" cy="100.00000" r="50" fill="white" opacity="0.7" />

  <text x="100" y="105" text-anchor="middle" font-family="sans-serif" font-size="16" fill="black">
    squish
  </text>
</svg>
